<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.5;
      display: none;
    }

    pre {
      background: #f5f5f5;
      padding: 1rem;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1 id="title">Unable to open latest report</h1>
  <p id="message"></p>
  <pre id="debug"></pre>

  <script>
    const FEATURE_LAYER_QUERY_URL =
      "https://services1.arcgis.com/xeMpV7tU1t4KD3Ei/arcgis/rest/services/survey123_22cde72c933248428bd7bd724ff6851d_results/FeatureServer/0/query";

    const LINK_FIELD = "report_url";
    const DATE_FIELD = "CreationDate";

    const titleEl = document.getElementById("title");
    const messageEl = document.getElementById("message");
    const debugEl = document.getElementById("debug");

    const urlParams = new URLSearchParams(window.location.search);
    const debugMode = urlParams.get("debug") === "1";

    function showPage(title, message, debugInfo = "") {
      document.body.style.display = "block";
      titleEl.textContent = title;
      messageEl.textContent = message;
      debugEl.textContent = debugInfo;
    }

    async function openLatestReport() {
      const params = new URLSearchParams({
        where: `${LINK_FIELD} IS NOT NULL`,
        outFields: `${LINK_FIELD},${DATE_FIELD},objectid`,
        returnGeometry: "false",
        orderByFields: `${DATE_FIELD} DESC`,
        resultRecordCount: "1",
        f: "json",
        _: Date.now().toString()
      });

      const arcgisQueryUrl = `${FEATURE_LAYER_QUERY_URL}?${params.toString()}`;

      const response = await fetch(arcgisQueryUrl, {
        cache: "no-store"
      });

      const text = await response.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        showPage(
          "Unable to open latest report",
          "ArcGIS returned an unexpected response.",
          text
        );
        return;
      }

      if (!response.ok || data.error) {
        showPage(
          "Unable to open latest report",
          "The ArcGIS query failed.",
          JSON.stringify({
            requestUrl: arcgisQueryUrl,
            response: data
          }, null, 2)
        );
        return;
      }

      const attributes = data.features?.[0]?.attributes;

      if (!attributes) {
        showPage(
          "No report found",
          "No report record was found in the feature layer.",
          JSON.stringify(data, null, 2)
        );
        return;
      }

      const latestUrl = attributes[LINK_FIELD];

      if (!latestUrl) {
        showPage(
          "No report URL found",
          `The latest record does not have a value in ${LINK_FIELD}.`,
          JSON.stringify(attributes, null, 2)
        );
        return;
      }

      let redirectUrl;

      try {
        redirectUrl = new URL(latestUrl);
      } catch {
        showPage(
          "Invalid report URL",
          "The report_url value is not a valid URL.",
          latestUrl
        );
        return;
      }

      if (redirectUrl.protocol !== "http:" && redirectUrl.protocol !== "https:") {
        showPage(
          "Invalid report URL",
          "The report_url value must start with http:// or https://.",
          latestUrl
        );
        return;
      }

      if (debugMode) {
        showPage(
          "Debug mode",
          "Latest report link found, but redirect is paused.",
          JSON.stringify({
            latestUrl: redirectUrl.toString(),
            latestRecordAttributes: attributes,
            arcgisQueryUrl: arcgisQueryUrl
          }, null, 2)
        );
        return;
      }

      window.location.replace(redirectUrl.toString());
    }

    openLatestReport().catch(error => {
      console.error(error);
      showPage(
        "Unable to open latest report",
        "Something went wrong while trying to open the latest report.",
        error.message
      );
    });
  </script>
</body>
</html>
